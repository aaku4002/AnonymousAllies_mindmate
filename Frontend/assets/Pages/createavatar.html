<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMate — Create Your Avatar</title>
<style>
  :root{
    --bg-1: #eef1fb;
    --bg-2: #e6ecfb;
    --ink: #1c2033;
    --ink-soft: #5b6178;
    --ink-faint: #8b90a3;
    --blue: #3d6bf0;
    --border: #e6e9f5;
    --panel: #ffffff;
    --shadow: 0 20px 45px -22px rgba(61, 79, 140, 0.28);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(120% 100% at 50% 0%, var(--bg-2) 0%, var(--bg-1) 55%, #f7f8fd 100%);
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 16px;
    display:flex;
    justify-content:center;
  }

  .app{
    width: 100%;
    max-width: 900px;
    display:flex;
    gap: 20px;
    align-items:flex-start;
    opacity: 0;
    transform: translateY(12px);
    animation: rise 0.6s ease forwards;
  }

  @keyframes rise{ to{ opacity:1; transform: translateY(0); } }

  /* Sidebar */
  .sidebar{
    width: 190px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px 12px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }

  .nav-item{
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    margin-bottom: 2px;
    user-select: none;
  }

  .nav-item svg{ flex-shrink:0; opacity: 0.8; }

  .nav-item:hover{ background: #f4f6fc; color: var(--ink); }

  .nav-item.active{
    background: #eef1fc;
    color: var(--ink);
    font-weight: 600;
  }

  .nav-item.active svg{ opacity: 1; }

  /* Main panel */
  .main-panel{
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 28px;
    display:flex;
    gap: 26px;
  }

  /* Avatar column */
  .avatar-col{
    flex: 1;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .avatar-ring{
    position:relative;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 40%, #f4f5fb 0%, #e5e8f5 70%, #dbdfef 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom: 14px;
  }

  .avatar-ring::before{
    content:"";
    position:absolute;
    inset: -6px;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: var(--blue);
    border-right-color: var(--blue);
    opacity: 0.5;
    animation: spin 1.6s linear infinite;
  }

  @keyframes spin{ to{ transform: rotate(360deg); } }

  .avatar-icon{
    color: #9aa0b4;
  }

  .ai-badge{
    display:inline-flex;
    align-items:center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    background: #f4f6fc;
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 12px;
  }

  .gen-status{
    display:flex;
    align-items:center;
    gap: 7px;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 16px;
  }

  .spinner{
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    animation: spin 0.9s linear infinite;
  }

  .avatar-col h2{
    font-size: 22px;
    margin: 0 0 8px;
    font-weight: 800;
    line-height: 1.3;
  }

  .avatar-col p{
    font-size: 13.5px;
    color: var(--ink-soft);
    max-width: 230px;
    line-height: 1.6;
    margin: 0;
  }

  /* Form column */
  .form-col{
    flex: 1;
    display:flex;
    flex-direction:column;
    padding-top: 4px;
  }

  label{
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
    display:block;
  }

  input[type="text"], textarea{
    width: 100%;
    font-family: inherit;
    font-size: 13.5px;
    color: var(--ink);
    background: #fafbff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    resize: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input[type="text"]{ margin-bottom: 20px; }

  textarea{ height: 110px; margin-bottom: 8px; }

  input[type="text"]:focus, textarea:focus{
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(61,107,240,0.12);
  }

  .hint{
    font-size: 12px;
    color: var(--ink-faint);
    margin: 0 0 20px;
  }

  .generate-btn{
    margin-top: auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
    background: #14161f;
    color: #fff;
    border: none;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    padding: 13px 20px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .generate-btn:hover{ background: #26293a; transform: translateY(-1px); }

  .generate-btn:disabled{
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  @media (max-width: 720px){
    .app{ flex-direction: column; }
    .sidebar{ width: 100%; display:flex; gap: 4px; padding: 10px; overflow-x:auto; }
    .nav-item{ white-space: nowrap; }
    .main-panel{ flex-direction: column; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="nav-item" data-nav>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Home
    </div>
    <div class="nav-item" data-nav>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
      Profile
    </div>
    <div class="nav-item" data-nav>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8 8 0 1 1-3.4-6.5"/><path d="M21 4v6h-6"/></svg>
      Messages
    </div>
    <div class="nav-item active" data-nav>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      Matches
    </div>
    <div class="nav-item" data-nav>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"/></svg>
      Settings
    </div>
  </nav>

  <!-- Main panel -->
  <section class="main-panel">

    <!-- Avatar generation column -->
    <div class="avatar-col">
      <div class="avatar-ring">
        <svg class="avatar-icon" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/>
        </svg>
      </div>

      <div class="ai-badge">✨ AI-Generated</div>

      <div class="gen-status" id="genStatus">
        <span class="spinner"></span>
        <span>AI is generating your avatar</span>
      </div>

      <h2>Create Your<br>Avatar</h2>
      <p>Let AI craft an identity that represents you</p>
    </div>

    <!-- Form column -->
    <div class="form-col">
      <label for="displayName">Name you like to use</label>
      <input type="text" id="displayName" placeholder="Your name or preferred display name">

      <label for="aboutMe">What's on your mind</label>
      <textarea id="aboutMe" placeholder="Describe yourself..."></textarea>
      <p class="hint">Our AI will use this to find your best match</p>

      <button class="generate-btn" id="generateBtn">
        ✨ Generate Avatar &amp; Continue
      </button>
    </div>

  </section>
</div>

<script>
  // Sidebar navigation state
  document.querySelectorAll('[data-nav]').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('[data-nav]').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
    });
  });

  // Generate avatar flow — replace with real API call in your project
  const generateBtn = document.getElementById('generateBtn');
  const genStatus = document.getElementById('genStatus');

  generateBtn.addEventListener('click', () => {
    const name = document.getElementById('displayName').value.trim();
    const about = document.getElementById('aboutMe').value.trim();

    if(!name || !about){
      alert('Please fill in both your display name and a short description first.');
      return;
    }

    generateBtn.disabled = true;
    generateBtn.textContent = 'Generating…';
    genStatus.innerHTML = '<span class="spinner"></span><span>AI is generating your avatar</span>';

    setTimeout(() => {
      genStatus.innerHTML = '<span>✅ Avatar generated</span>';
      generateBtn.disabled = false;
      generateBtn.innerHTML = '✨ Generate Avatar &amp; Continue';
      alert('Avatar generated! Continuing to the next step…');
    }, 1600);
  });
</script>

</body>
</html>
