<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Login</title>
<style>
  :root{
    --bg: #eef0f2;
    --card: #ffffff;
    --ink: #14161a;
    --muted: #6b7280;
    --field-bg: #fafafa;
    --field-border: #e5e7eb;
    --pill-border: #e5e7eb;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 0%, #f5f6f7, var(--bg));
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--ink);
    padding: 40px 20px;
  }

  .card{
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border-radius: 20px;
    padding: 40px 32px 32px;
    box-shadow: 0 20px 60px rgba(20,22,26,0.07), 0 2px 8px rgba(20,22,26,0.04);
    text-align: center;
  }

  .avatar{
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #fbfbfc;
    border: 1px solid #ececef;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
  }

  .avatar svg{
    width: 26px;
    height: 26px;
    stroke: #3a3d42;
  }

  h1{
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

  .subtitle{
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 28px;
  }

  .field{
    text-align: left;
    margin-bottom: 18px;
  }

  label{
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #9a9da3;
    margin-bottom: 8px;
  }

  input{
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--field-border);
    background: var(--field-bg);
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  input::placeholder{
    color: #b2b4b9;
  }

  input:focus{
    border-color: #b7bac0;
    background: #ffffff;
  }

  .continue-btn{
    width: 100%;
    padding: 13px 0;
    margin-top: 6px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  .continue-btn:hover{
    background: #2a2d33;
  }

  .continue-btn:active{
    transform: scale(0.98);
  }

  .link-row{
    margin-top: 16px;
  }

  .link-row button{
    background: none;
    border: none;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
  }

  .link-row button:hover{
    color: var(--ink);
    text-decoration: underline;
  }

  .footnote{
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid #f0f1f2;
    font-size: 12px;
    color: #a3a6ab;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .footnote svg{
    width: 12px;
    height: 12px;
    stroke: #a3a6ab;
  }

  @media (max-width: 400px){
    .card{ padding: 32px 22px 26px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>
    </svg>
  </div>

  <h1>Anonymous</h1>
  <p class="subtitle">Your identity stays private</p>

  <form id="loginForm">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your anonymous username">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button type="submit" class="continue-btn">Continue Anonymously</button>
  </form>

  <div class="link-row">
    <button type="button" id="newIdentityBtn">Create new anonymous identity</button>
  </div>

  <div class="footnote">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="11" width="14" height="9" rx="2"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    </svg>
    Trusted by design · Secure anonymous access
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const newIdentityBtn = document.getElementById('newIdentityBtn');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      alert('Please fill in both fields to continue anonymously.');
      return;
    }

    // Placeholder for actual anonymous auth logic.
    console.log('Continuing anonymously as:', username);
    alert('Continuing anonymously…');
  });

  newIdentityBtn.addEventListener('click', () => {
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('username').focus();
  });
</script>

</body>
</html>
